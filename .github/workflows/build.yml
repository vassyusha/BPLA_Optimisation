name: Build and Update README

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать вручную

permissions:
  contents: write

jobs:
  build_and_update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure and Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          
      - name: Run and Update README
        shell: bash
        run: |
          # Сохраняем чистый заголовок README
          echo "# BPLA Optimisation" > README.md
          echo "Проект автоматической оптимизации параметров БПЛА." >> README.md
          
          # Запускаем программу и дописываем её вывод в README
          ./build/Release/BPLA_Optimisation.exe >> README.md
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update optimization results [skip ci]"
          # Используем ваш секрет вместо стандартного токена
          git push https://${{ secrets.MY_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main